services:
  postgres:
    image: postgres:16-alpine
    container_name: postgresql
    environment:
      - POSTGRES_USER=tuananh
      - POSTGRES_PASSWORD=123
      - POSTGRES_DB=jira-db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuananh -d jira-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data: